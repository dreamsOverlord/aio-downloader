name: "mhrv-python-dynamic-exit-node"

on:
  workflow_dispatch:
    inputs:
      vpn_enabled:
        description: 'Route all traffic through WireGuard VPN (requires WG_CONFIG secret)'
        type: boolean
        default: false

jobs:
  relay:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: "Set up WireGuard VPN (if enabled)"
        id: vpn
        run: |
          VPN_ENABLED="${{ inputs.vpn_enabled }}"
          if [ "$VPN_ENABLED" != "true" ]; then
            echo "vpn_available=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ -z "${{ secrets.WG_CONFIG }}" ]; then
            echo "⚠️ VPN enabled but WG_CONFIG secret is empty – VPN disabled for this run."
            echo "vpn_available=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "→ Installing WireGuard tools..."
          sudo apt-get update -qq
          sudo apt-get install -y -qq wireguard-tools openresolv 2>/dev/null || \
            sudo apt-get install -y -qq wireguard-tools

          echo "→ Writing WireGuard config..."
          cat <<'EOF' > /tmp/wg0.conf
          ${{ secrets.WG_CONFIG }}
          EOF
          sudo cp /tmp/wg0.conf /etc/wireguard/wg0.conf
          sudo chmod 600 /etc/wireguard/wg0.conf

          echo "→ Bringing up wg0..."
          if sudo wg-quick up wg0; then
            echo "✅ WireGuard VPN connected."
            echo "vpn_available=true" >> $GITHUB_OUTPUT
          else
            echo "⚠️ Failed to bring up WireGuard – VPN disabled."
            sudo wg-quick down wg0 2>/dev/null || true
            echo "vpn_available=false" >> $GITHUB_OUTPUT
          fi

      - name: Download cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared

      - name: Start Node
        env:
          TUNNEL_AUTH_KEY: ${{ secrets.TUNNEL_AUTH_KEY }}
        run: |
          python3 .github/script/python-exit-node.py --host 127.0.0.1 --port 8181 &
          sleep 2

      - name: Expose
        run: |
          ./cloudflared tunnel --url http://127.0.0.1:8181 > /tmp/tunnel.log 2>&1 &
          sleep 10
          PUBLIC_URL=$(grep -o 'https://[^ ]*\.trycloudflare\.com' /tmp/tunnel.log | head -1)
          echo "$PUBLIC_URL" > /tmp/public_url.txt
          echo "--------------------------------------------------"
          echo "🌐 $PUBLIC_URL"
          echo "--------------------------------------------------"

      - name: Run
        run: |
          PUBLIC_URL=$(cat /tmp/public_url.txt)
          echo "=================================================="
          echo "  running perfectly!"
          echo "  $PUBLIC_URL"
          echo "=================================================="
          while true; do
            sleep 3600
            echo "[$(date)] → $PUBLIC_URL"
          done
